name: Secret Scan

# Runs on every push to main to catch accidentally committed secrets.
# Also runs on pull requests — though PRs are not accepted, this acts
# as a safety net if one is accidentally merged.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read   # read-only — this workflow cannot write or push

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for private repos or orgs.
          # For a public personal repo, no license is needed.
